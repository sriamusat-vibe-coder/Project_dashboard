{% extends "erp/base.html" %}
{% block title %}Submit Expense – BIM Bytes ERP{% endblock %}
{% block page_title %}Submit Expense{% endblock %}
{% block page_sub %}Record a new expense claim{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-7">
<div class="card">
<div class="card-body">
<form method="POST">
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Employee *</label>
    <select name="employee_id" class="form-select" required>
      <option value="">— Select Employee —</option>
      {% for e in employees %}
      <option value="{{ e.id }}" {% if current_user.employee and current_user.employee.id==e.id %}selected{% endif %}>{{ e.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Expense Date *</label>
    <input name="expense_date" type="date" class="form-control" required value="{{ today }}">
  </div>
  <div class="col-md-6">
    <label class="form-label">Category *</label>
    <select name="category" class="form-select" required id="catSel" onchange="updateSubcats()">
      <option value="">— Select —</option>
      {% for cat in categories %}
      <option>{{ cat }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Sub-Category</label>
    <select name="sub_category" class="form-select" id="subCatSel">
      <option value="">— Select category first —</option>
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Project</label>
    <select name="project_id" class="form-select">
      <option value="">— Not project-specific —</option>
      {% for p in projects %}
      <option value="{{ p.id }}">{{ p.project_id }} – {{ p.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Amount (₹) *</label>
    <input name="amount" type="number" step="0.01" class="form-control" required placeholder="0.00">
  </div>
  <div class="col-12">
    <label class="form-label">Description *</label>
    <textarea name="description" class="form-control" rows="3" required placeholder="Brief description of the expense..."></textarea>
  </div>
  <div class="col-md-6">
    <label class="form-label">Vendor / Payee</label>
    <input name="vendor" class="form-control" placeholder="Vendor or payee name">
  </div>
  <div class="col-md-6">
    <label class="form-label">Receipt Reference</label>
    <input name="receipt_url" class="form-control" placeholder="Receipt number or reference">
  </div>
</div>

<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-brand"><i class="bi bi-send me-1"></i>Submit Expense</button>
  <a href="/expenses" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const subcats = {{ subcats | tojson }};
function updateSubcats(){
  const cat = document.getElementById('catSel').value;
  const sel = document.getElementById('subCatSel');
  sel.innerHTML = '<option value="">— Select —</option>';
  (subcats[cat] || []).forEach(s => {
    const opt = document.createElement('option'); opt.text = s; opt.value = s;
    sel.appendChild(opt);
  });
}
</script>
{% endblock %}
