{% extends "erp/base.html" %}
{% block title %}New User – BIM Bytes ERP{% endblock %}
{% block page_title %}Create User Account{% endblock %}
{% block page_sub %}Grant system access{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-6">
<div class="card">
<div class="card-body">
<form method="POST">
<div class="row g-3">
  <div class="col-md-12">
    <label class="form-label">Full Name *</label>
    <input name="name" class="form-control" required placeholder="Full name">
  </div>
  <div class="col-md-12">
    <label class="form-label">Email *</label>
    <input name="email" type="email" class="form-control" required placeholder="user@bimbytes.com">
  </div>
  <div class="col-md-6">
    <label class="form-label">Role *</label>
    <select name="role" class="form-select" required>
      {% for r in ['admin','director','finance','hr','bim_manager','project_manager','employee'] %}
      <option value="{{ r }}">{{ r | replace('_',' ') | title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Link to Employee</label>
    <select name="employee_id" class="form-select">
      <option value="">— No Employee Link —</option>
      {% for e in employees %}
      <option value="{{ e.id }}">{{ e.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-12">
    <label class="form-label">Password *</label>
    <input name="password" type="password" class="form-control" required placeholder="Min 8 characters">
  </div>
</div>
<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-brand"><i class="bi bi-person-check me-1"></i>Create User</button>
  <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
