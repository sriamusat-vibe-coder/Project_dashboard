{% extends "erp/base.html" %}
{% block title %}Add BIM Record – BIM Bytes ERP{% endblock %}
{% block page_title %}Add BIM Record{% endblock %}
{% block page_sub %}Log a BIM model submission or quality record{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-7">
<div class="card">
<div class="card-body">
<form method="POST">
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Project *</label>
    <select name="project_id" class="form-select" required>
      <option value="">— Select Project —</option>
      {% for p in projects %}
      <option value="{{ p.id }}">{{ p.project_id }} – {{ p.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Record Type *</label>
    <select name="record_type" class="form-select" required>
      {% for t in ['Model Submission','Clash Detection Report','Quality Check','RFI','Issue Log','Approval','Design Review','Coordination Meeting'] %}
      <option>{{ t }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Record Date</label>
    <input name="record_date" type="date" class="form-control" value="{{ today }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">LOD Level</label>
    <select name="lod_level" class="form-select">
      <option value="">— N/A —</option>
      {% for l in ['LOD 100','LOD 200','LOD 300','LOD 350','LOD 400','LOD 500'] %}
      <option>{{ l }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Model Version</label>
    <input name="model_version" class="form-control" placeholder="v1.0, Rev B…">
  </div>
  <div class="col-md-6">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
      {% for s in ['Open','In Review','Approved','Rejected','Resolved','Closed'] %}
      <option>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Clash Count</label>
    <input name="clash_count" type="number" min="0" class="form-control" placeholder="0 (for clash reports)">
  </div>
  <div class="col-md-6">
    <label class="form-label">Submitted By</label>
    <select name="submitted_by" class="form-select">
      <option value="">— Select —</option>
      {% for e in employees %}
      <option value="{{ e.id }}" {% if current_user.employee and current_user.employee.id==e.id %}selected{% endif %}>{{ e.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">File Path / Reference</label>
    <input name="file_path" class="form-control" placeholder="BIM360://project/model.rvt">
  </div>
  <div class="col-12">
    <label class="form-label">Description *</label>
    <textarea name="description" class="form-control" rows="4" required placeholder="Describe the record – scope, issues found, resolutions..."></textarea>
  </div>
</div>
<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-brand"><i class="bi bi-check2 me-1"></i>Save Record</button>
  <a href="/bim/records" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
