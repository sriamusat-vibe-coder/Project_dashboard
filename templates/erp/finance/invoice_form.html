{% extends "erp/base.html" %}
{% block title %}New Invoice – BIM Bytes ERP{% endblock %}
{% block page_title %}New Invoice{% endblock %}
{% block page_sub %}Create a billing invoice{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-8">
<div class="card">
<div class="card-body">
<form method="POST">

<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Invoice Number *</label>
    <input name="invoice_number" class="form-control" required placeholder="INV-0014" value="{{ next_inv_num or '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label">Project *</label>
    <select name="project_id" class="form-select" required id="projectSel" onchange="fillClient()">
      <option value="">— Select Project —</option>
      {% for p in projects %}
      <option value="{{ p.id }}" data-client="{{ p.client_id or '' }}" {% if request.args.get('project_id')|int == p.id %}selected{% endif %}>{{ p.project_id }} – {{ p.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Client *</label>
    <select name="client_id" class="form-select" required id="clientSel">
      <option value="">— Select Client —</option>
      {% for c in clients %}
      <option value="{{ c.id }}">{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3">
    <label class="form-label">Invoice Date *</label>
    <input name="invoice_date" type="date" class="form-control" required value="{{ today }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">Due Date *</label>
    <input name="due_date" type="date" class="form-control" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Subtotal (₹) *</label>
    <input name="subtotal" type="number" step="0.01" class="form-control" required placeholder="0.00" oninput="calcTotal()">
  </div>
  <div class="col-md-4">
    <label class="form-label">Tax (₹)</label>
    <input name="tax_amount" id="tax" type="number" step="0.01" class="form-control" placeholder="0.00" oninput="calcTotal()">
  </div>
  <div class="col-md-4">
    <label class="form-label">Discount (₹)</label>
    <input name="discount" id="disc" type="number" step="0.01" class="form-control" placeholder="0.00" oninput="calcTotal()">
  </div>
  <div class="col-md-4">
    <label class="form-label">Total Amount (₹)</label>
    <input name="total_amount" id="total" type="number" step="0.01" class="form-control" readonly style="background:#f7fafc;font-weight:700">
  </div>
  <div class="col-md-4">
    <label class="form-label">Currency</label>
    <select name="currency" class="form-select">
      {% for c in ['INR','USD','AED','SGD','GBP','EUR'] %}
      <option {% if c=='INR' %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
      {% for s in ['Pending','Partially Paid','Paid'] %}
      <option>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Payment Terms</label>
    <select name="payment_terms" class="form-select">
      {% for t in ['Net 30','Net 45','Net 60','Immediate','Milestone-based'] %}
      <option>{{ t }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Milestone Reference</label>
    <input name="milestone_id" class="form-control" placeholder="Linked milestone">
  </div>
  <div class="col-12">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2" placeholder="Payment instructions, bank details..."></textarea>
  </div>
</div>

<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-brand"><i class="bi bi-check2 me-1"></i>Create Invoice</button>
  <a href="/finance/invoices" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const projectClients = { {% for p in projects %}'{{ p.id }}':'{{ p.client_id or "" }}'{% if not loop.last %},{% endif %}{% endfor %} };
function fillClient(){
  const pid = document.getElementById('projectSel').value;
  const cid = projectClients[pid];
  if(cid){ document.getElementById('clientSel').value = cid; }
}
function calcTotal(){
  const sub = parseFloat(document.querySelector('[name=subtotal]').value)||0;
  const tax = parseFloat(document.getElementById('tax').value)||0;
  const disc = parseFloat(document.getElementById('disc').value)||0;
  document.getElementById('total').value = (sub + tax - disc).toFixed(2);
}
window.onload = function(){
  {% if request.args.get('project_id') %}
  fillClient();
  {% endif %}
};
</script>
{% endblock %}
