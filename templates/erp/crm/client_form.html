{% extends "erp/base.html" %}
{% block title %}New Client – BIM Bytes ERP{% endblock %}
{% block page_title %}New Client{% endblock %}
{% block page_sub %}Add a client to CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-7">
<div class="card">
<div class="card-body">
<form method="POST">
<div class="row g-3">
  <div class="col-md-12">
    <label class="form-label">Company Name *</label>
    <input name="name" class="form-control" required placeholder="e.g. ABC Construction Ltd">
  </div>
  <div class="col-md-6">
    <label class="form-label">Contact Person</label>
    <input name="contact_person" class="form-control" placeholder="Primary contact name">
  </div>
  <div class="col-md-6">
    <label class="form-label">Email</label>
    <input name="email" type="email" class="form-control" placeholder="contact@company.com">
  </div>
  <div class="col-md-4">
    <label class="form-label">Phone</label>
    <input name="phone" class="form-control" placeholder="+91 98765 43210">
  </div>
  <div class="col-md-4">
    <label class="form-label">City</label>
    <input name="city" class="form-control" placeholder="Mumbai">
  </div>
  <div class="col-md-4">
    <label class="form-label">Country</label>
    <input name="country" class="form-control" placeholder="India" value="India">
  </div>
  <div class="col-md-6">
    <label class="form-label">Industry</label>
    <select name="industry" class="form-select">
      <option value="">— Select —</option>
      {% for i in ['Real Estate','Infrastructure','Healthcare','Retail','Industrial','Government','Mixed-Use','Transportation','Hospitality'] %}
      <option>{{ i }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Website</label>
    <input name="website" class="form-control" placeholder="https://www.company.com">
  </div>
  <div class="col-12">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2" placeholder="Additional notes about this client..."></textarea>
  </div>
</div>
<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-brand"><i class="bi bi-check2 me-1"></i>Add Client</button>
  <a href="/crm/clients" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
